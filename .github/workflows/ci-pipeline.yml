name: CloudShop Microservices CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Download our code from the GitHub repository onto the Linux server
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install Java 21 on the Linux server
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Build the Product Service
      - name: Build Product Service
        run: |
          cd product-service
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      # Build the Order Service
      - name: Build Order Service
        run: |
          cd order-service
          chmod +x mvnw
          ./mvnw clean package -DskipTests